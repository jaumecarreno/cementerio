<!doctype html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seleccionar persona</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="picker-popup-body">
  <main class="picker-popup-main">
    <h1 class="page-title">Seleccionar persona</h1>
    <div class="box">
      <form method="get" action="{{ url_for('cemetery.expediente_person_picker') }}">
        <input type="hidden" name="target_field" value="{{ target_field }}">
        <input type="hidden" name="label_field" value="{{ label_field }}">
        <div class="picker-filters-row">
          <div class="picker-filter-item">
            <label>Busqueda libre</label>
            <input type="text" name="q" value="{{ filters.q }}" placeholder="ID, nombre, apellidos o DNI/NIF">
          </div>
          <div class="picker-filter-item">
            <label>ID persona</label>
            <input type="text" name="person_id" value="{{ filters.person_id }}">
          </div>
          <div class="picker-filter-item">
            <label>Nombre</label>
            <input type="text" name="first_name" value="{{ filters.first_name }}">
          </div>
          <div class="picker-filter-item">
            <label>Apellidos</label>
            <input type="text" name="last_name" value="{{ filters.last_name }}">
          </div>
          <div class="picker-filter-item">
            <label>DNI/NIF</label>
            <input type="text" name="dni_nif" value="{{ filters.dni_nif }}">
          </div>
        </div>
        <div class="actions-row">
          <button class="btn" type="submit">Buscar</button>
          <a class="btn" href="{{ url_for('cemetery.expediente_person_picker', target_field=target_field, label_field=label_field) }}">Limpiar</a>
          <button class="btn" type="button" onclick="window.close()">Cerrar</button>
        </div>
      </form>
    </div>

    <div class="box">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>DNI/NIF</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {% for row in rows %}
          <tr>
            <td>{{ row.id }}</td>
            <td>{{ row.full_name }}</td>
            <td>{{ row.dni_nif or '-' }}</td>
            <td>
              <button
                class="btn"
                type="button"
                onclick="return choosePersona({{ target_field|tojson }}, {{ row.id|tojson }}, {{ label_field|tojson }}, {{ row.full_name|tojson }});"
              >Seleccionar</button>
            </td>
          </tr>
          {% else %}
          <tr><td colspan="4">Sin resultados</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </main>
  <script>
    function fallbackRedirect(fieldId, value, preferOpener) {
      if (fieldId !== "deceased_person_id") {
        return false;
      }
      var base = "{{ url_for('cemetery.expedientes') }}";
      var next = base + "?prefill_deceased_person_id=" + encodeURIComponent(String(value || ""));
      if (preferOpener && window.opener && !window.opener.closed) {
        try {
          window.opener.location.href = next;
          window.close();
          return true;
        } catch (err) {
        }
      }
      window.location.href = next;
      return true;
    }

    function choosePersona(fieldId, value, labelFieldId, labelText) {
      var payload = {
        type: "cem-picker-select",
        fieldId: fieldId,
        value: value,
        labelFieldId: labelFieldId,
        labelText: labelText
      };
      var delivered = false;
      if (window.opener && !window.opener.closed) {
        try {
          if (window.opener.CemPopupPicker && typeof window.opener.CemPopupPicker.setField === "function") {
            delivered = !!window.opener.CemPopupPicker.setField(fieldId, value, labelFieldId, labelText);
          }
        } catch (err) {
        }
        try {
          window.opener.postMessage(payload, window.location.origin);
        } catch (err) {
        }
      }
      if (delivered) {
        window.close();
        return false;
      }
      return fallbackRedirect(fieldId, value, true);
    }
  </script>
</body>
</html>
