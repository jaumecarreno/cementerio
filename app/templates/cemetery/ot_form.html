{% extends "base.html" %}
{% set active_cem = 'ordenes_trabajo' %}
{% block title %}Nueva OT{% endblock %}
{% block content %}
<h1 class="page-title">Nueva orden de trabajo</h1>

<div class="box">
  <form method="post" action="{{ url_for('cemetery.ot_new') }}">
    <div class="form-grid">
      <div>
        <label>Título</label>
        <input type="text" name="title" value="{{ form_data.title or '' }}" required>
      </div>
      <div>
        <label>Descripción</label>
        <input type="text" name="description" value="{{ form_data.description or '' }}">
      </div>
      <div>
        <label>Plantilla</label>
        <select name="template_id">
          <option value="">Sin plantilla</option>
          {% for item in templates %}
          <option value="{{ item.id }}" {% if form_data.template_id == (item.id|string) %}selected{% endif %}>{{ item.code }} - {{ item.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Tipo</label>
        <select name="type_code">
          <option value="">Sin tipo</option>
          {% for item in types %}
          <option value="{{ item.code }}" {% if form_data.type_code == item.code %}selected{% endif %}>{{ item.code }} - {{ item.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Categoría</label>
        <select name="category">
          {% for value in categories %}
          <option value="{{ value }}" {% if (form_data.category or 'MANTENIMIENTO') == value %}selected{% endif %}>{{ value }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Prioridad</label>
        <select name="priority">
          {% for value in priorities %}
          <option value="{{ value }}" {% if (form_data.priority or 'MEDIA') == value %}selected{% endif %}>{{ value }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Estado inicial</label>
        <select name="status">
          {% for value in statuses %}
          <option value="{{ value }}" {% if (form_data.status or 'BORRADOR') == value %}selected{% endif %}>{{ value }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Sepultura ID</label>
        <input type="number" min="1" name="sepultura_id" value="{{ form_data.sepultura_id or '' }}">
      </div>
      <div>
        <label>Tipo área</label>
        <select name="area_type">
          <option value="">Sin área</option>
          {% for value in area_types %}
          <option value="{{ value }}" {% if form_data.area_type == value %}selected{% endif %}>{{ value }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Código área</label>
        <input type="text" name="area_code" value="{{ form_data.area_code or '' }}">
      </div>
      <div>
        <label>Texto ubicación</label>
        <input type="text" name="location_text" value="{{ form_data.location_text or '' }}">
      </div>
      <div>
        <label>Asignar a</label>
        <select name="assigned_user_id">
          <option value="">Sin asignar</option>
          {% for user in users %}
          <option value="{{ user.id }}" {% if form_data.assigned_user_id == (user.id|string) %}selected{% endif %}>{{ user.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div>
        <label>Inicio planificado</label>
        <input type="datetime-local" name="planned_start_at" value="{{ form_data.planned_start_at or '' }}">
      </div>
      <div>
        <label>Fin planificado</label>
        <input type="datetime-local" name="planned_end_at" value="{{ form_data.planned_end_at or '' }}">
      </div>
      <div>
        <label>Vencimiento SLA</label>
        <input type="datetime-local" name="due_at" value="{{ form_data.due_at or '' }}">
      </div>
    </div>
    <div class="actions-row">
      <button class="btn primary" type="submit">Crear OT</button>
      <a class="btn" href="{{ url_for('cemetery.ot_list') }}">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
